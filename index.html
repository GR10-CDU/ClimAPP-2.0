<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climapp · Concepción del Uruguay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Opción A · Editorial denso: Newsreader + IBM Plex Sans + IBM Plex Mono -->
<!-- Opción B · Técnico: Space Grotesk + Space Mono -->
<!-- Opción C · Humanista: Source Serif 4 + Source Sans 3 + JetBrains Mono -->
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }

  /* Default font tokens (font A · editorial) */
  :root {
    --font-serif: 'Newsreader', Georgia, serif;
    --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  [data-font="tecnico"] {
    --font-serif: 'Space Grotesk', -apple-system, sans-serif;
    --font-sans: 'Space Grotesk', -apple-system, sans-serif;
    --font-mono: 'Space Mono', ui-monospace, monospace;
  }
  [data-font="humanista"] {
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Source Sans 3', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  body {
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 0; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 280px;
    background: rgba(20,20,22,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    z-index: 9999;
    color: #fff;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
    display: none;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }
  .tweaks-panel.visible { display: block; }
  .tweaks-title {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
  }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .tweak-row:last-child { margin-bottom: 0; }
  .tweak-label {
    font-size: 12px; color: rgba(255,255,255,0.7);
    display: flex; justify-content: space-between;
  }
  .tweak-label span { color: #fff; font-family: var(--font-mono); font-size: 11px; }
  .seg {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 2px; gap: 2px; flex-wrap: wrap;
  }
  .seg button {
    flex: 1; min-width: 0;
    background: transparent; border: 0;
    color: rgba(255,255,255,0.6);
    padding: 6px 6px; font-size: 11px;
    font-family: inherit; border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .seg button.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .seg button:hover:not(.active) { color: rgba(255,255,255,0.85); }

  @keyframes twinkle { 0%,100% { opacity: 0.35 } 50% { opacity: 1 } }
  @keyframes drift { from { transform: translateX(-10px); } to { transform: translateX(calc(100vw + 10px)); } }
  @keyframes rainFall { to { transform: translateY(120vh); } }
  @keyframes fogDrift {
    0% { transform: translateX(-30%) scale(1.2); opacity: 0.2; }
    50% { opacity: 0.5; }
    100% { transform: translateX(30%) scale(1.3); opacity: 0.2; }
  }
  @keyframes sunPulse {
    0%, 100% { filter: drop-shadow(0 0 30px oklch(0.85 0.14 70 / 0.4)); }
    50% { filter: drop-shadow(0 0 50px oklch(0.85 0.14 70 / 0.7)); }
  }
  @keyframes flashBolt {
    0%, 92%, 100% { opacity: 0; }
    93%, 95% { opacity: 1; }
    94% { opacity: 0; }
  }
  @keyframes flashSky {
    0%, 92%, 100% { opacity: 0; }
    93%, 95% { opacity: 0.5; }
    94% { opacity: 0; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes wave1 { to { transform: translateX(-200px); } }
  @keyframes wave2 { to { transform: translateX(-240px); } }
  @keyframes expandIn {
    from { opacity: 0; transform: translateY(-4px); max-height: 0; }
    to { opacity: 1; transform: translateY(0); max-height: 600px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
{"theme":"auto","density":"spacious","timeOfDay":"day","weather":"parcial","font":"editorial"}
</script>

<script src="data.js?v=2"></script>
<script src="data-live.js?v=1"></script>
<script src="palettes.js?v=2"></script>
<script type="text/babel" data-presets="react" src="ribera-parts.jsx?v=2"></script>
<script type="text/babel" data-presets="react" src="ribera-sections.jsx?v=2"></script>
<script type="text/babel" data-presets="react" src="ribera.jsx?v=2"></script>

<script>
(function(){
  const defaults = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "density": "compact",
    "timeOfDay": "day",
    "weather": "lluvia",
    "font": "humanista"
  }/*EDITMODE-END*/;
  window.__tweakDefaults = defaults;

  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      document.querySelector('.tweaks-panel')?.classList.add('visible');
    }
    if (d.type === '__deactivate_edit_mode') {
      document.querySelector('.tweaks-panel')?.classList.remove('visible');
    }
  });
  window.parent.postMessage({type:'__edit_mode_available'}, '*');
})();
</script>
</body>
</html>
