const dirFromDeg = (d) => {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];

const beaufort = (kmh) => {
  const ms = kmh / 3.6;
  const scale = [[0.3,0,'Calma'],[1.5,1,'Aire ligero'],[3.3,2,'Brisa muy débil'],[5.5,3,'Brisa suave'],

  for (const [lim,n,name] of scale) if (ms <= lim) return { num: n, nombre: name };
  return { num: 12, nombre: 'Huracán' };
};
const hhmm = (iso) => {

const moonPhase = (date) => {
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  let r = y % 100;
  r %= 19; if (r > 9) r -= 19;
  r = ((r*11) % 30) + m + d;
  if (m < 3) r += 2;
  r -= (y < 2000 ? 4 : 8.3);
  r = Math.floor(r + 0.5) % 30;
  const age = r < 0 ? r + 30 : r;
  const illumination = Math.round((1 - Math.cos((age / 29.53) * 2 * Math.PI)) / 2 * 100);
  let fase;
  if (age < 1.84) fase = 'Luna nueva';
  else if (age < 5.53) fase = 'Creciente';
  else if (age < 9.22) fase = 'Cuarto creciente';
  else if (age < 12.91) fase = 'Gibosa creciente';
  else if (age < 16.61) fase = 'Luna llena';
  else if (age < 20.30) fase = 'Gibosa menguante';
  else if (age < 23.99) fase = 'Cuarto menguante';
  else if (age < 27.68) fase = 'Menguante';
  else fase = 'Luna nueva';
  return { fase, iluminacion: illumination, age };
};
const pescaIndice = (temp, viento, presion, fase) => {
  let s = 5;
  if (temp >= 18 && temp <= 26) s += 1.5; else if (temp >= 14 && temp <= 30) s += 0.5;
  if (viento <= 15) s += 1; else if (viento <= 25) s += 0.2; else s -= 1;
  if (presion >= 1012 && presion <= 1020) s += 1;
  if (fase.includes('llena') || fase.includes('nueva')) s += 1.5;
  else if (fase.includes('creciente') || fase.includes('menguante')) s += 0.5;
  s = Math.max(0, Math.min(10, s));
  const etiqueta = s >= 8 ? 'Excelente' : s >= 6.5 ? 'Bueno' : s >= 5 ? 'Regular' : s >= 3 ? 'Malo' : 'Muy malo';
  return { indice: Number(s.toFixed(1)), etiqueta };
};

async function fetchClima() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
    + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,is_day,precipitation,weather_code,`
    + `pressure_msl,cloud_cover,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index`
    + `&hourly=temperature_2m,precipitation_probability,weather_code,is_day,visibility`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max`
    + `&forecast_days=10&timezone=America%2FArgentina%2FBuenos_Aires`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('open-meteo failed');
  return r.json();
}
async function fetchDolar() {
  try { const r = await fetch('https://dolarapi.com/v1/dolares'); if (!r.ok) throw 0; return r.json(); }
  catch (e) { return null; }
}

/* ---- Builders / mergers ---- */
function buildFromMeteo(m, mock) {
  const cur = m.current;
  const hourly = m.hourly;
  const daily = m.daily;
  const now = new Date();

  const nowIdx = hourly.time.findIndex(t => new Date(t) >= now) - 1;
  const startIdx = Math.max(0, nowIdx);
  const horario = [];
  for (let i = 0; i < 12; i++) {
    const idx = startIdx + i;
    if (!hourly.time[idx]) break;
    const t = new Date(hourly.time[idx]);
    horario.push({
      hora: String(t.getHours()).padStart(2,'0')+'h',
      temp: Math.round(hourly.temperature_2m[idx]),
      icon: hourIcon(hourly.weather_code[idx], hourly.is_day[idx] === 1),
      prob: hourly.precipitation_probability[idx] || 0,
    });
  }

  const allDaily = daily.time.map((iso,i) => {
    const d = new Date(iso + 'T12:00:00');
    return {
      dia: DAYS_ES[d.getDay()],
      fecha: String(d.getDate()),
      icon: wmoIcon(daily.weather_code[i]),
      max: Math.round(daily.temperature_2m_max[i]),
      min: Math.round(daily.temperature_2m_min[i]),
      prob: daily.precipitation_probability_max[i] || 0,
      cond: wmoText(daily.weather_code[i]),
    };
  });
  const todayStr = now.toISOString().slice(0,10);
  const todayIdx = daily.time.indexOf(todayStr);
  const fromIdx = todayIdx >= 0 ? todayIdx : 0;
  const diario = allDaily.slice(fromIdx, fromIdx+3);
  const extendido = allDaily.slice(fromIdx+3, fromIdx+10);

  const sunrise = hhmm(daily.sunrise[fromIdx]);
  const sunset = hhmm(daily.sunset[fromIdx]);
  const moon = moonPhase(now);
  const bf = beaufort(cur.wind_speed_10m);
  const visIdx = hourly.time.findIndex(t => t.startsWith(todayStr));
  const vis = visIdx >= 0 ? Math.round((hourly.visibility[visIdx] || 15000) / 1000) : 15;

  const ico = hourIcon(cur.weather_code, cur.is_day === 1);
  const condTxt = wmoText(cur.weather_code);
  let weatherKey = 'parcial';
  const wc = cur.weather_code;
  if (wc === 0 || wc === 1) weatherKey = 'despejado';
  else if (wc === 2) weatherKey = 'parcial';
  else if (wc === 3 || wc === 45 || wc === 48) weatherKey = 'nublado';
  else if (wc >= 95) weatherKey = 'tormenta';
  else if (wc >= 51) weatherKey = 'lluvia';

  const dayName = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][now.getDay()];
  const fechaStr = `${now.getDate()} ${MONTHS_ES[now.getMonth()]} ${now.getFullYear()}`;
  const pesca = pescaIndice(cur.temperature_2m, cur.wind_speed_10m, cur.pressure_msl, moon.fase);

  return {
    ...mock,
    fecha: fechaStr,
    diaSemana: dayName,
    temp: Math.round(cur.temperature_2m),
    tempAparente: Math.round(cur.apparent_temperature),
    tempMin: Math.round(daily.temperature_2m_min[fromIdx]),
    tempMax: Math.round(daily.temperature_2m_max[fromIdx]),
    condicion: condTxt,
    condicionIcon: ico,
    humedad: Math.round(cur.relative_humidity_2m),
    presion: Math.round(cur.pressure_msl),
    uv: Math.round(cur.uv_index ?? 0),
    visibilidad: vis,
    nubosidad: Math.round(cur.cloud_cover ?? 0),
    puntoRocio: Math.round(cur.temperature_2m - ((100 - cur.relative_humidity_2m)/5)),
    viento: {
      velocidad: Math.round(cur.wind_speed_10m),
      rafaga: Math.round(cur.wind_gusts_10m ?? cur.wind_speed_10m),
      direccion: dirFromDeg(cur.wind_direction_10m),
      direccionDeg: Math.round(cur.wind_direction_10m),
      beaufort: bf.num, beaufortNombre: bf.nombre,
    },
    horario, diario, extendido,
    sol: { salida: sunrise, puesta: sunset },
    luna: { fase: moon.fase, iluminacion: moon.iluminacion, salida: mock.luna.salida, puesta: mock.luna.puesta },
    pesca: {
      ...pesca,
      factores: [
        { icon: '🌗', name: moon.fase, status: (moon.fase.includes('llena')||moon.fase.includes('nueva')) ? 'good' : 'neutral' },
        { icon: '💨', name: `Viento ${Math.round(cur.wind_speed_10m)}km/h`, status: cur.wind_speed_10m<=15?'good':cur.wind_speed_10m<=25?'neutral':'bad' },
        { icon: '🌡️', name: `Temp ${Math.round(cur.temperature_2m)}°`, status: (cur.temperature_2m>=18&&cur.temperature_2m<=26)?'good':'neutral' },
        { icon: '📉', name: `Presión ${Math.round(cur.pressure_msl)}`, status: (cur.pressure_msl>=1012&&cur.pressure_msl<=1020)?'good':'neutral' },
      ],
    },
    uvDetalle: {
      valor: Math.round(cur.uv_index ?? 0),
      etiqueta: (cur.uv_index ?? 0) < 3 ? 'Bajo' : (cur.uv_index ?? 0) < 6 ? 'Moderado' : (cur.uv_index ?? 0) < 8 ? 'Alto' : 'Muy alto',
      recomendacion: (cur.uv_index ?? 0) < 3 ? 'Sin protección' : (cur.uv_index ?? 0) < 6 ? 'Protección recomendada' : 'Protección obligatoria',
    },
    radar: { estado: cur.precipitation > 0 ? 'Lluvia activa' : 'Sin precipitación cercana' },
    actualizado: 'recién',
    _weatherKey: weatherKey,
  };
}

function mergeRio(data, rio) {
  if (!rio?.data?.puertos) return data;
  const p = rio.data.puertos;
  const cdu = p.concepcion;
  const hist = (rio.historial || []).map(h => h.altura);
  const min7d = hist.length ? Math.min(...hist) : data.rio.min7d;
  const max7d = hist.length ? Math.max(...hist) : data.rio.max7d;

  const orderedKeys = ['saltoGrandeArriba','saltoGrandeAbajo','concordia','colon','concepcion','paysandu','frayBentos','nuevaPalmira'];
  const shortNames = {
    saltoGrandeArriba: 'Salto Grande Ar.', saltoGrandeAbajo: 'Salto Grande Ab.',
    concordia: 'Concordia', colon: 'Colón', concepcion: 'Concepción del U.',
    paysandu: 'Paysandú', frayBentos: 'Fray Bentos', nuevaPalmira: 'Nueva Palmira',
  };
  const estaciones = orderedKeys.filter(k => p[k]).map(k => ({
    nombre: shortNames[k],
    nivel: p[k].nivel,
    variacion: p[k].variacion,
    estado: p[k].estado,
    fechaHora: p[k].fechaHora,
  }));

  // tendencia
  const varCm = Math.round((cdu?.variacion || 0) * 100);
  const tendencia = (varCm >= 0 ? '+' : '') + varCm + ' cm';

  data.rio = {
    ...data.rio,
    nivel: cdu?.nivel ?? data.rio.nivel,
    tendencia,
    estado: cdu?.estado ?? 'estable',
    historial: hist.length ? hist : data.rio.historial,
    min7d, max7d,
    tempAgua: rio.data.tempAgua ?? data.rio.tempAgua,
    estaciones,
    actualizado: cdu?.fechaHora || '',
  };
  return data;
}

function mergeDolar(data, dolar, btc) {
  if (!dolar) return data;
  const map = { oficial: 'Oficial', blue: 'Blue', bolsa: 'MEP', contadoconliqui: 'CCL' };
  const cotiz = dolar
    .filter(d => map[d.casa])
    .map(d => ({ nombre: map[d.casa], compra: Math.round(d.compra), venta: Math.round(d.venta) }));
  if (btc) cotiz.push({ nombre: 'Bitcoin', venta: Math.round(btc), unidad: 'USD' });
  if (cotiz.length) data.cotizaciones = cotiz;
  return data;
}

function mergeFeriados(data, feriados) {
  if (!feriados || !Array.isArray(feriados)) return data;
  const now = new Date();
  const prox = feriados
    .map(f => {
      const [y,m,d] = f.fecha.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      const dias = Math.ceil((dt - now) / 86400000);
      return { ...f, dt, dias };
    })
    .filter(f => f.dias >= 0)
    .sort((a,b) => a.dias - b.dias)
    .slice(0, 4)
    .map(f => ({
      nombre: f.nombre,
      fecha: `${f.dt.getDate()} ${MONTHS_ES[f.dt.getMonth()]}`,
      dias: f.dias,
      tipo: f.tipo === 'inamovible' ? 'Inamovible' : f.tipo === 'trasladable' ? 'Trasladable' : (f.tipo||'Feriado'),
      pais: '🇦🇷',
    }));
  if (prox.length) data.feriados = prox;
  return data;
}

function mergeFarmacias(data, f) {
  if (!f) return data;
  // Try to adapt loosely based on possible shapes
  if (f.success && f.data) f = f.data;
  if (Array.isArray(f) && f.length) {
    const main = f[0];
    data.farmacia = {
      nombre: main.nombre || main.farmacia || 'Farmacia de turno',
      direccion: main.direccion || '',
      telefono: main.telefono || '',
      otras: f.slice(1, 4).map(x => x.nombre || x.farmacia).filter(Boolean),
    };
  } else if (f.nombre || f.farmacia) {
    data.farmacia = {
      nombre: f.nombre || f.farmacia,
      direccion: f.direccion || '',
      telefono: f.telefono || '',
      otras: data.farmacia.otras,
    };
  }
  return data;
}

function mergeDeportes(data, d) {
  if (!d) return data;
  if (d.success && d.data) d = d.data;
  if (!Array.isArray(d) || !d.length) return data;
  data.deportes = d.slice(0, 5).map(ev => ({
    liga: (ev.liga || ev.competencia || 'FUTBOL').toUpperCase().slice(0, 10),
    local: ev.local || ev.equipoLocal || ev.home || '?',
    visitante: ev.visitante || ev.equipoVisitante || ev.away || '?',
    hora: ev.hora || ev.fecha || ev.horario || '',
  }));
  return data;
}

/* ---- Bootstrap ---- */
async function bootData() {
  try {
    const [meteo, dolar, btc, feriados, rio, farmacias, deportes] = await Promise.all([
      fetchClima().catch(() => null),
      fetchDolar(),
      fetchBtc(),
      fetchFeriados(),
      fetchRio(),
      fetchFarmacias(),
      fetchDeportes(),
    ]);

    let data = { ...window.CLIMA_DATA };
    if (meteo) data = buildFromMeteo(meteo, data);
    data = mergeRio(data, rio);
    data = mergeDolar(data, dolar, btc);
    data = mergeFeriados(data, feriados);
    data = mergeFarmacias(data, farmacias);
    data = mergeDeportes(data, deportes);

    window.CLIMA_DATA = data;
    window.__liveDataReady = true;
    window.dispatchEvent(new CustomEvent('clima-data-updated', { detail: data }));
    console.log('[Climapp] Datos cargados', data);
  } catch (e) {
    console.warn('[Climapp] Error cargando datos:', e);
    window.CLIMA_DATA.actualizado = 'sin conexión';
    window.dispatchEvent(new CustomEvent('clima-data-updated', { detail: window.CLIMA_DATA }));
  }
}
</script>

function Sparkline({data, color, h=30}) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*100},${h - ((v-min)/range) * (h-4) - 2}`).join(' ');
  const fillPts = `0,${h} ${pts} 100,${h}`;
  const gid = `spk-${color.replace(/[^a-z0-9]/gi,'')}`;
  return (
    <svg viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{width:'100%', height:h, display:'block'}}>
      <defs>

function App() {
  const defaults = window.__tweakDefaults || {};
  const [data, setData] = useState(window.CLIMA_DATA);
  const [theme, setTheme] = useState(defaults.theme || 'auto');
  const [density, setDensity] = useState(defaults.density || 'spacious');
  const [timeOfDay, setTimeOfDay] = useState(defaults.timeOfDay || 'day');
  const [font, setFont] = useState(defaults.font || 'editorial');
  const [weather, setWeather] = useState(defaults.weather || 'auto');
  const [rioExpanded, setRioExpanded] = useState(false);
  const [now, setNow] = useState(new Date());
  const [pull, setPull] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const scrollRef = useRef(null);
  const touchStart = useRef(null);

  useEffect(() => {
    const onUpdate = (e) => setData({...e.detail});
    window.addEventListener('clima-data-updated', onUpdate);
    if (window.__liveDataReady) setData({...window.CLIMA_DATA});
    return () => window.removeEventListener('clima-data-updated', onUpdate);
  }, []);

  // Clock tick
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  // Auto time-of-day (based on hour)
  useEffect(() => {
    if (theme !== 'auto') return;
    const h = now.getHours();
    let t;
    if (h >= 5 && h < 8) t = 'dawn';
    else if (h >= 8 && h < 18) t = 'day';
    else if (h >= 18 && h < 21) t = 'dusk';
    else t = 'night';
    setTimeOfDay(t);
  }, [now, theme]);

  const effectiveWeather = weather === 'auto' ? (data._weatherKey || 'parcial') : weather;
  const isDark = theme === 'dark' || (theme === 'auto' && timeOfDay === 'night');
  const isLight = theme === 'light' || (theme === 'auto' && timeOfDay !== 'night');

  const bodyBg = isDark ? '#0a0a0c' : '#f5f3ef';
  const bodyInk = isDark ? '#e8e8ed' : '#1a1a1f';
  const bodyInkSoft = isDark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.55)';

  const updateKey = (key, val) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  // Pull to refresh
  const onTouchStart = (e) => {
    if (scrollRef.current?.scrollTop === 0) touchStart.current = e.touches[0].clientY;
  };
  const onTouchMove = (e) => {
    if (touchStart.current == null || refreshing) return;
    const dy = e.touches[0].clientY - touchStart.current;
    if (dy > 0 && scrollRef.current?.scrollTop === 0) setPull(Math.min(110, dy * 0.5));
  };
  const onTouchEnd = () => {
    if (pull > 55 && !refreshing) {
      setRefreshing(true);
      bootData();
      setTimeout(() => { setRefreshing(false); setPull(0); }, 1500);
    } else setPull(0);
    touchStart.current = null;
  };

  const padX = density === 'compact' ? 12 : 14;
  const gap = density === 'compact' ? 8 : 10;

  // Format current time HH:MM
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const dowLabel = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'][now.getDay()];
  const dateLabel = `${dowLabel} ${now.getDate()} ${MONTHS_ES[now.getMonth()].toUpperCase()}`;

  // Condicion display según weather tweak
  const condMap = {
    despejado: { icon: '☀️', text: 'Despejado' },
    parcial: { icon: '⛅', text: 'Parcialmente nublado' },
    nublado: { icon: '☁️', text: 'Nublado' },
    lluvia: { icon: '🌧️', text: 'Lluvia' },
    tormenta: { icon: '⛈️', text: 'Tormenta' },
  };
  const condDisplay = weather === 'auto'
    ? { icon: data.condicionIcon, text: data.condicion }
    : condMap[weather];

  return (
    <div data-font={font} data-theme={isDark ? 'dark' : 'light'} style={{
      width:'100%', height:'100%',
      background: bodyBg,
      color: bodyInk,
      position:'relative', overflow:'hidden',
    }}>
      {/* Pull indicator */}
      {(pull > 0 || refreshing) && (
        <div className="ptr" style={{ height: Math.max(pull, refreshing ? 50 : 0), color: bodyInkSoft }}>
          {refreshing ? 'actualizando…' : pull > 55 ? '↓ soltar' : '↓ tirar'}
        </div>
      )}

      <div ref={scrollRef}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          width:'100%', height:'100%',
          overflowY:'auto', padding: padX,
          transform: `translateY(${pull}px)`,
          transition: touchStart.current ? 'none' : 'transform 0.3s',
        }}>

        {/* Top bar */}
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'10px 8px 14px',
        }}>
          <div>
            <div style={{fontSize:13, fontWeight:600, letterSpacing:'0.01em'}}>
              {data.ciudad}
            </div>
            <div style={{fontSize:10, color: bodyInkSoft, marginTop:2,
              fontFamily:'var(--font-mono)', letterSpacing:'0.1em', textTransform:'uppercase'}}>
              {data.provincia} · Argentina
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:10, color: bodyInkSoft,
              fontFamily:'var(--font-mono)', letterSpacing:'0.1em'}}>{dateLabel}</div>
            <div style={{fontSize:13, fontFamily:'var(--font-mono)', marginTop:2, fontWeight:500}}>{hh}:{mm}</div>
          </div>
        </div>

        {/* BENTO GRID */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap, alignItems:'start'}}>

          {/* === CLIMA (XL) === */}
          <ClimaCard data={data} cond={condDisplay} weather={effectiveWeather}/>

          {/* === RIO (TALL) === */}
          <RioCard data={data} onTap={() => setRioExpanded(true)}/>

          {/* === DOLAR === */}
          <DolarCard cotiz={data.cotizaciones}/>

          {/* === UV === */}
          <UVCard uv={data.uvDetalle}/>

          {/* === PRONOSTICO (WIDE) === */}
          <PronosticoCard diario={data.diario}/>

          {/* === VIENTO === */}
          <VientoCard viento={data.viento}/>

          {/* === SOL + LUNA === */}
          <SolLunaCard sol={data.sol} luna={data.luna}/>

          {/* === PESCA === */}
          <PescaCard pesca={data.pesca}/>

          {/* === HORARIO (WIDE) — próximas horas === */}
          <HorarioCard horario={data.horario}/>

          {/* === DEPORTES (WIDE) === */}
          <DeportesCard deportes={data.deportes}/>

          {/* === CINE (WIDE) === */}
          <CineCard cine={data.cine}/>

          {/* === FARMACIAS === */}
          <FarmaciaCard farmacia={data.farmacia}/>

          {/* === FERIADO === */}
          <FeriadoCard feriados={data.feriados}/>

          {/* === CAMARA (WIDE) === */}
          <CamaraCard camara={data.camara}/>

          {/* === RADAR (WIDE) === */}
          <RadarCard radar={data.radar}/>

          {/* === TELEFONOS (WIDE) === */}
          <TelefonosCard telefonos={data.telefonos}/>

          {/* === EXTENDIDO si hay (WIDE) === */}
          {data.extendido?.length > 0 && <ExtendidoCard extendido={data.extendido}/>}

        </div>

        {/* footer */}
        <div style={{
          textAlign:'center', fontSize:10, fontFamily:'var(--font-mono)',
          color: bodyInkSoft, padding:'16px 0 8px',
          letterSpacing:'0.1em',
        }}>
          actualizado {data.actualizado} · SMN · CARU · Open-Meteo
        </div>
      </div>

      {/* Rio expanded modal */}
      {rioExpanded && <RioModal data={data} onClose={() => setRioExpanded(false)}/>}

      {/* Tweaks panel */}
      <div className="tweaks-panel">
        <div className="tweaks-title">Tweaks</div>
        <div className="tweak-row">
          <div className="tweak-label">Hora del día <span>{timeOfDay}</span></div>
          <div className="seg">
            {[['dawn','Amanec'],['day','Día'],['dusk','Atardec'],['night','Noche']].map(([t,lbl]) => (
              <button key={t}
                className={theme==='auto' && timeOfDay===t ? 'active' : ''}
                onClick={() => { setTimeOfDay(t); setTheme('manual'); updateKey('timeOfDay', t); updateKey('theme','manual'); }}>
                {lbl}
              </button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Tema</div>
          <div className="seg">
            {['auto','light','dark'].map(t => (
              <button key={t}
                className={theme === t ? 'active' : ''}
                onClick={() => { setTheme(t); updateKey('theme', t); }}>
                {t === 'auto' ? 'Auto' : t === 'light' ? 'Claro' : 'Oscuro'}
              </button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Densidad</div>
          <div className="seg">
            <button className={density === 'spacious' ? 'active' : ''}
              onClick={() => { setDensity('spacious'); updateKey('density','spacious'); }}>Espacioso</button>
            <button className={density === 'compact' ? 'active' : ''}
              onClick={() => { setDensity('compact'); updateKey('density','compact'); }}>Compacto</button>
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Tipografía</div>
          <div className="seg">
            {[['editorial','A'],['tecnico','B'],['humanista','C']].map(([f,lbl]) => (
              <button key={f}
                className={font === f ? 'active' : ''}
                onClick={() => { setFont(f); updateKey('font', f); }}>{lbl}</button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Condición <span>{weather}</span></div>
          <div className="seg">
            {[['auto','🔄'],['despejado','☀️'],['parcial','⛅'],['nublado','☁️'],['lluvia','🌧️'],['tormenta','⛈️']].map(([w,ic]) => (
              <button key={w}
                className={weather === w ? 'active' : ''}
                onClick={() => { setWeather(w); updateKey('weather', w); }}
                title={w}>{ic}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function RioCard({data, onTap}) {
  const r = data.rio;
  const varCm = r.tendencia || '+0 cm';
  const varPositive = !varCm.startsWith('-');
  const varColor = r.estado === 'crece' ? '#9edc9e' : r.estado === 'baja' ? '#f0a0a0' : '#cfd8e0';
  const statusText = r.estado === 'crece' ? 'creciendo' : r.estado === 'baja' ? 'bajando' : 'estable';

  return (
    <div className="card c-rio tall tap" onClick={onTap}>
      <RiverWaves/>
      <div style={{position:'relative', zIndex:2}}>
        <div className="lbl" style={{color:'#b8d5f0'}}><LiveDot/> RÍO URUGUAY</div>
        <div style={{fontSize:10, opacity:0.55, marginTop:2, fontFamily:'var(--font-mono)'}}>{r.puerto}</div>
      </div>

      <div style={{position:'relative', zIndex:2, margin:'14px 0 8px'}}>
        <div className="serif pop" style={{fontSize:46, lineHeight:0.9, fontWeight:400, letterSpacing:'-0.03em'}}>
          {r.nivel?.toFixed?.(2) ?? r.nivel}
          <span style={{fontSize:16, opacity:0.6, marginLeft:2}}>m</span>
        </div>
        <div className="mono" style={{fontSize:12, color: varColor, marginTop:3}}>

        </div>
      </div>

      <div style={{position:'relative', zIndex:2, marginBottom:8}}>
        <Sparkline data={r.historial} color="#9ec7ed" h={26}/>
        <div className="mono" style={{display:'flex', justifyContent:'space-between', fontSize:9, opacity:0.5, marginTop:3}}>
          <span>{r.historial?.length || 7}d atrás</span>
          <span>hoy</span>
        </div>
      </div>

      <hr className="sep-dashed" style={{position:'relative', zIndex:2}}/>

      <div style={{position:'relative', zIndex:2, fontSize:11, fontFamily:'var(--font-mono)'}}>
        <div style={{fontSize:9, opacity:0.55, letterSpacing:'0.13em', marginBottom:4, textTransform:'uppercase'}}>Estaciones N→S</div>
        {r.estaciones?.slice(0,5).map(e=>{
          const trend = e.estado === 'crece' ? '↑' : e.estado === 'baja' ? '↓' : '–';
          const tc = e.estado === 'crece' ? '#9edc9e' : e.estado === 'baja' ? '#f0a0a0' : 'currentColor';
          return (
            <div key={e.nombre} style={{display:'flex', justifyContent:'space-between', padding:'2px 0', opacity:0.85}}>
              <span style={{fontFamily:'var(--font-sans)', fontSize:10.5}}>{e.nombre}</span>

      <hr className="sep-dashed" style={{position:'relative', zIndex:2}}/>

      <div className="mono" style={{position:'relative', zIndex:2, fontSize:9, opacity:0.55, textAlign:'center'}}>
        alerta {r.alerta}m · evac. {r.evacuacion}m {r.tempAgua ? `· agua ${r.tempAgua}°` : ''}
      </div>
    </div>
  );
}

function HorarioCard({horario}) {
  if (!horario?.length) return null;
  const temps = horario.map(h => h.temp);
  const min = Math.min(...temps), max = Math.max(...temps);
  const range = (max - min) || 1;
  return (
    <div className="card c-horario wide">
      <div className="lbl">🕐 PRÓXIMAS HORAS</div>
      <hr className="sep"/>
      <div style={{display:'flex', gap:12, overflowX:'auto', marginRight:-10, paddingRight:10, paddingBottom:2}}>
        {horario.slice(0,12).map((h, i) => {
          const barH = 28;
          const dotY = barH - ((h.temp - min) / range) * (barH - 6) - 3;
          return (
            <div key={i} style={{flexShrink:0, textAlign:'center', minWidth:32}}>
              <div className="mono" style={{fontSize:9, opacity:0.7}}>{h.hora}</div>
              <div style={{fontSize:14, margin:'2px 0'}}>{h.icon}</div>
              <div className="serif" style={{fontSize:15, fontWeight:400}}>{h.temp}°</div>
              <div style={{width:3, height:barH, background:'currentColor', opacity:0.15, borderRadius:2, position:'relative', margin:'3px auto 0'}}>
                <div style={{position:'absolute', top:dotY, left:-1, width:5, height:5, borderRadius:'50%', background:'#ffcf3c'}}/>
              </div>
              <div className="mono" style={{fontSize:8, opacity: h.prob > 30 ? 1 : 0.5, color: h.prob > 30 ? '#9ec7ed' : 'currentColor', marginTop:2}}>{h.prob}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ExtendidoCard({extendido}) {
  const allT = extendido.flatMap(d => [d.min, d.max]);
  const gMin = Math.min(...allT), gMax = Math.max(...allT);
  const range = gMax - gMin || 1;
  return (
    <div className="card c-horario wide">
      <div className="lbl">📆 EXTENDIDO · 7 DÍAS</div>
      <hr className="sep"/>
      {extendido.map((d, i) => {
        const left = ((d.min - gMin) / range) * 100;
        const width = ((d.max - d.min) / range) * 100;
        return (
          <div key={i} style={{
            display:'grid', gridTemplateColumns:'42px 22px 1fr 56px',
            alignItems:'center', gap:8, padding:'5px 0',
            borderTop: i > 0 ? '1px dashed rgba(255,255,255,0.12)' : 'none',
            fontSize:11,
          }}>
            <span className="mono" style={{opacity:0.75}}>{d.dia} {d.fecha}</span>

            <div style={{position:'relative', height:4, background:'rgba(255,255,255,0.1)', borderRadius:2}}>
              <div style={{position:'absolute', left:`${left}%`, width:`${width}%`, top:0, bottom:0,

}

function FeriadoCard({feriados}) {

  if (!first) return null;
  return (
    <div className="card c-fer reg">
      <div className="lbl">🇦🇷 FERIADO</div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginTop:8, gap:8}}>
        <div style={{flex:1, minWidth:0}}>
          <div className="serif" style={{fontSize:15, fontWeight:500, lineHeight:1.15}}>{first.nombre}</div>
          <div className="serif" style={{fontSize:10, opacity:0.72, marginTop:3, fontStyle:'italic'}}>{first.tipo?.toLowerCase()}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="mono" style={{fontSize:18, fontWeight:600, whiteSpace:'nowrap'}}>{first.fecha}</div>
          <div style={{fontSize:10, opacity:0.75}}>en {first.dias} días</div>
        </div>
      </div>
      {rest.length > 0 && (
        <>

   RIO EXPANDED MODAL

function RioModal({data, onClose}) {
  const r = data.rio;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:9998,
      display:'flex', alignItems:'center', justifyContent:'center',
      animation:'fadeIn 0.25s ease-out', padding:16,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'linear-gradient(180deg, #123458 0%, #081c38 100%)',
        color:'#b8d5f0', borderRadius:22, padding:22, maxWidth:460, width:'100%',
        maxHeight:'90vh', overflowY:'auto', position:'relative',
      }}>
        <button onClick={onClose} style={{
          position:'absolute', top:14, right:14, width:30, height:30, borderRadius:'50%',
          border:'1px solid rgba(255,255,255,0.15)', background:'rgba(255,255,255,0.05)',
          color:'#b8d5f0', cursor:'pointer', fontSize:16,
        }}>×</button>
        <div className="lbl"><LiveDot/> RÍO URUGUAY · DETALLE</div>
        <div className="serif" style={{fontSize:60, lineHeight:0.9, fontWeight:300, letterSpacing:'-0.04em', marginTop:12}}>
          {r.nivel?.toFixed?.(2)}<span style={{fontSize:22, opacity:0.6}}>m</span>
        </div>
        <div style={{fontSize:12, marginTop:4}}>en {r.puerto} · {r.tendencia} · {r.estado}</div>
        <hr className="sep"/>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, fontSize:11}}>
          <div>
            <div className="mono" style={{fontSize:9, opacity:0.6}}>MIN 7D</div>
            <div className="mono" style={{fontSize:14}}>{r.min7d}m</div>
          </div>
          <div>
            <div className="mono" style={{fontSize:9, opacity:0.6}}>MAX 7D</div>
            <div className="mono" style={{fontSize:14}}>{r.max7d}m</div>
          </div>
          <div>
            <div className="mono" style={{fontSize:9, opacity:0.6}}>AGUA</div>
            <div className="mono" style={{fontSize:14}}>{r.tempAgua ?? '—'}°</div>
          </div>
        </div>
        <hr className="sep"/>
        <Sparkline data={r.historial} color="#9ec7ed" h={60}/>
        <hr className="sep"/>
        <div className="lbl" style={{marginBottom:6}}>Todas las estaciones</div>
        {r.estaciones?.map(e => {
          const trend = e.estado === 'crece' ? '↑' : e.estado === 'baja' ? '↓' : '–';
          const tc = e.estado === 'crece' ? '#9edc9e' : e.estado === 'baja' ? '#f0a0a0' : 'currentColor';
          return (
            <div key={e.nombre} className="mono" style={{
              display:'flex', justifyContent:'space-between', padding:'6px 0',
              borderTop:'1px dashed rgba(255,255,255,0.1)', fontSize:12,
            }}>
              <span style={{fontFamily:'var(--font-sans)'}}>{e.nombre}</span>
              <span>
                <span style={{color:tc, marginRight:6}}>{trend} {e.variacion != null ? (e.variacion >= 0 ? '+' : '') + e.variacion.toFixed(2) : ''}</span>
                {typeof e.nivel === 'number' ? e.nivel.toFixed(2) : e.nivel}m
              </span>
            </div>
          );
        })}
        <div className="mono" style={{fontSize:9, opacity:0.5, marginTop:12, textAlign:'center'}}>
          alerta {r.alerta}m · evacuación {r.evacuacion}m · fuente CARU
        </div>
      </div>
    </div>
  );
}

{"theme":"auto","density":"spacious","timeOfDay":"day","weather":"auto","font":"editorial"}

<script>
(function(){
  const defaults = /*EDITMODE-BEGIN*/{
    "theme": "auto",
    "density": "spacious",
    "timeOfDay": "day",
    "weather": "auto",
    "font": "editorial"
  }/*EDITMODE-END*/;
  window.__tweakDefaults = defaults;

  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      document.querySelector('.tweaks-panel')?.classList.add('visible');
    }
    if (d.type === '__deactivate_edit_mode') {
      document.querySelector('.tweaks-panel')?.classList.remove('visible');
    }
  });
  window.parent.postMessage({type:'__edit_mode_available'}, '*');

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootData);
  } else {
    bootData();
  }
})();
</script>
